<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Management System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f7fa;
      color: #2d3748;
      line-height: 1.6;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0,0, 0.1), 0 2px 4px -1px rgba(0, 0,0, 0.06);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      color: white;
      padding: 32px 40px;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
    }

    .header-content {
      position: relative;
      z-index: 1;
      max-width: 800px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.9;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 24px;
      padding: 32px 40px;
      border-bottom: 1px solid #e2e8f0;
      background: #fafbfc;
    }

    .stat-card {
      text-align: center;
      padding: 24px 20px;
      background: white;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      transition: all 0.2s ease;
    }

    .stat-card:hover {
      border-color: #3b82f6;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
      transform: translateY(-1px);
    }

    .stat-number {
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 8px;
      display: block;
    }

    .stat-total .stat-number { color: #1e293b; }
    .stat-present .stat-number { color: #10b981; }
    .stat-absent .stat-number { color: #ef4444; }

    .stat-label {
      font-size: 14px;
      color: #64748b;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .controls {
      padding: 24px 40px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .refresh-btn {
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 12px 24px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .refresh-btn:hover {
      background: #2563eb;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
      transform: translateY(-1px);
    }

    .last-updated {
      color: #64748b;
      font-size: 14px;
      white-space: nowrap;
    }

    .table-container {
      overflow-x: auto;
      padding: 0;
      max-height: 500px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      table-layout: fixed; /* FIXED ALIGNMENT */
      min-width: 1000px;
    }

    th, td {
      padding: 20px 20px; /* UNIFORM PADDING */
      text-align: left;
      vertical-align: middle;
      border-bottom: 1px solid #f3f4f6;
      word-wrap: break-word;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    th {
      background: #f8fafc;
      color: #374151;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.05em;
      border-bottom: 2px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 10;
      font-size: 13px; /* Slightly larger for headers */
    }

    /* COLUMN WIDTHS - PERFECT ALIGNMENT */
    th:nth-child(1), td:nth-child(1) { width: 18%; } /* Name */
    th:nth-child(2), td:nth-child(2) { width: 16%; } /* Branch */
    th:nth-child(3), td:nth-child(3) { width: 16%; } /* Date */
    th:nth-child(4), td:nth-child(4) { width: 14%; } /* Time */
    th:nth-child(5), td:nth-child(5) { width: 20%; } /* Status - wider for badges */

    tr {
      transition: background-color 0.15s ease;
    }

    tr:hover {
      background: #fef7ff;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      max-width: 100%;
    }

    .status-present {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .status-present::before {
      content: '✓';
      font-weight: 900;
      font-size: 14px;
    }

    .status-absent {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .status-absent::before {
      content: '✗';
      font-weight: 900;
      font-size: 14px;
    }

    .empty-state, .loading-state {
      text-align: center;
      padding: 80px 40px;
      color: #6b7280;
    }

    .loading-state {
      color: #3b82f6;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e5e7eb;
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-state {
      text-align: center;
      padding: 60px 40px;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      margin: 20px 40px;
    }

    @media (max-width: 768px) {
      body { padding: 16px; }
      .header, .stats-grid, .controls { padding-left: 24px; padding-right: 24px; }
      .header h1 { font-size: 24px; }
      
      .stats-grid { 
        grid-template-columns: repeat(2, 1fr); 
        gap: 16px; 
        padding: 24px; 
      }
      
      .controls {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }
      
      th, td { 
        padding: 16px 12px; 
        font-size: 14px; 
      }
      
      .status-badge {
        padding: 6px 12px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-content">
        <h1>Attendance Records</h1>
        <p>Real-time attendance tracking and reporting</p>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card stat-total">
        <div class="stat-number" id="totalCount">0</div>
        <div class="stat-label">Total Records</div>
      </div>
      <div class="stat-card stat-present">
        <div class="stat-number" id="presentCount">0</div>
        <div class="stat-label">Present</div>
      </div>
      <div class="stat-card stat-absent">
        <div class="stat-number" id="absentCount">0</div>
        <div class="stat-label">Absent</div>
      </div>
    </div>

    <div class="controls">
      <button class="refresh-btn" onclick="loadRecords()">
        🔄 Refresh Data
      </button>
      <div class="last-updated" id="lastUpdated">-</div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Branch</th>
            <th>Date</th>
            <th>Time</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Dynamic content -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api/attendance'; //here update with your api
    
    function updateStats(total, present, absent) {
      document.getElementById('totalCount').textContent = total.toLocaleString();
      document.getElementById('presentCount').textContent = present.toLocaleString();
      document.getElementById('absentCount').textContent = absent.toLocaleString();
    }

    function updateTimestamp() {
      document.getElementById('lastUpdated').textContent = 
        `Last updated: ${new Date().toLocaleTimeString('en-IN', { 
          hour: '2-digit', 
          minute: '2-digit',
          hour12: true 
        })}`;
    }

    function showLoading() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = `
        <tr>
          <td colspan="5" class="loading-state">
            <div class="spinner"></div>
            Loading attendance records...
          </td>
        </tr>
      `;
      updateStats(0, 0, 0);
    }

    function showEmptyState() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = `
        <tr>
          <td colspan="5" class="empty-state">
            <svg viewBox="0 0 24 24" fill="currentColor" style="width: 64px; height: 64px; opacity: 0.5; margin-bottom: 20px; display: block; margin: 0 auto 20px;">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
            No attendance records found
          </td>
        </tr>
      `;
    }

    async function loadRecords() {
      const tbody = document.getElementById('tableBody');
      showLoading();
      updateTimestamp();

      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const records = await response.json();
        
        if (records.length === 0) {
          showEmptyState();
          updateStats(0, 0, 0);
          return;
        }

        const presentCount = records.filter(r => r.attendance?.toLowerCase() === 'present').length;
        const absentCount = records.filter(r => r.attendance?.toLowerCase() === 'absent').length;
        updateStats(records.length, presentCount, absentCount);

        tbody.innerHTML = records.map(record => {
          const date = new Date(record.date).toLocaleDateString('en-IN');
          const statusClass = record.attendance?.toLowerCase() === 'present' ? 'status-present' : 'status-absent';
          return `
            <tr>
              <td title="${record.name || '-'}">${record.name || '-'}</td>
              <td title="${record.branch || '-'}">${record.branch || '-'}</td>
              <td>${date}</td>
              <td>${record.time || '-'}</td>
              <td><span class="status-badge ${statusClass}" title="${record.attendance || 'Unknown'}">${record.attendance || 'Unknown'}</span></td>
            </tr>
          `;
        }).join('');

      } catch (error) {
        console.error('Load error:', error);
        tbody.innerHTML = `
          <tr>
            <td colspan="5" class="error-state">
              <strong>Unable to load records</strong><br>
              Please ensure the backend server is running on <code>${API_URL}</code>
            </td>
          </tr>
        `;
        updateStats(0, 0, 0);
      }
    }

    // Auto-refresh every 60 seconds
    setInterval(loadRecords, 60000);
    
    // Initial load
    document.addEventListener('DOMContentLoaded', loadRecords);
  </script>
</body>
</html>
